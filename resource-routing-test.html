<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>路由测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .test-link {
            display: block;
            padding: 15px;
            margin: 10px 0;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .test-link:hover {
            background: #0056b3;
        }
        .test-button {
            padding: 15px 30px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 0;
            font-size: 16px;
        }
        .test-button:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <h1>基础 HTML 点击测试</h1>
    <p>如果这个页面的链接也需要点击两次才能跳转，说明问题不在 React Router</p>

    <a href="http://localhost:5173/" class="test-link">跳转到首页</a>
    <a href="http://localhost:5173/items" class="test-link">跳转到闲置物品</a>
    <a href="http://localhost:5173/skills" class="test-link">跳转到技能服务</a>

    <h2>JavaScript 测试</h2>
    <button class="test-button" onclick="window.location.href='http://localhost:5173/items'">
        使用 window.location.href 跳转
    </button>
    <button class="test-button" onclick="window.location.reload()">
        刷新当前页面
    </button>

    <div id="log" style="margin-top: 20px; padding: 10px; background: #f0f0f0;">
        <h3>点击日志:</h3>
        <div id="clickLog"></div>
    </div>

    <script>
        document.addEventListener('click', function(e) {
            const log = document.getElementById('clickLog');
            const time = new Date().toLocaleTimeString();
            log.innerHTML += `<p>${time}: 点击了 ${e.target.tagName} - ${e.target.textContent || e.target.className}</p>`;
        });
    </script>
</body>
</html>
